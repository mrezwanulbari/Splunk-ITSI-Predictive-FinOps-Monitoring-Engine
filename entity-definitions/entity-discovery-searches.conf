# =============================================================================
# Entity Discovery Searches for ITSI
# =============================================================================
# These searches automatically discover and maintain entities in ITSI
# from various data sources in your Splunk environment.
# =============================================================================

# --- Discover Hosts from Internal Metrics ---
[Entity Discovery - Hosts from Metrics]
search = index=_internal source=*metrics.log group=tcpin_connections | stats latest(version) as splunk_version, latest(os) as operating_system, latest(arch) as architecture, latest(fwdType) as forwarder_type by hostname, sourceIp | rename hostname as host, sourceIp as ip
entity_title_field = host
entity_identifier_fields = host, ip
entity_information_fields = splunk_version, operating_system, architecture, forwarder_type
entity_type = splunk_forwarder
schedule = 0 */4 * * *

# --- Discover Network Devices from Syslog ---
[Entity Discovery - Network Devices]
search = index=idx_network sourcetype=cisco:ios OR sourcetype=cisco:nxos | stats count by host, sourcetype | eval device_type=case(sourcetype=="cisco:ios","router",sourcetype=="cisco:nxos","switch",1==1,"network_device")
entity_title_field = host
entity_identifier_fields = host
entity_information_fields = device_type, sourcetype
entity_type = network_device
schedule = 0 */6 * * *

# --- Discover Windows Servers ---
[Entity Discovery - Windows Servers]
search = index=idx_os_windows sourcetype=WinHostMon | stats latest(OS) as os_version, latest(Architecture) as architecture by host | eval entity_type="windows_server"
entity_title_field = host
entity_identifier_fields = host
entity_information_fields = os_version, architecture, entity_type
entity_type = windows_server
schedule = 0 */4 * * *

# --- Discover Linux Servers ---
[Entity Discovery - Linux Servers]
search = index=idx_os_linux sourcetype=hardware | stats latest(os_name) as os_name, latest(os_version) as os_version by host | eval entity_type="linux_server"
entity_title_field = host
entity_identifier_fields = host
entity_information_fields = os_name, os_version, entity_type
entity_type = linux_server
schedule = 0 */4 * * *

# --- Discover Security Devices ---
[Entity Discovery - Security Devices]
search = index=idx_firewall OR index=idx_network_security | stats count, values(sourcetype) as device_sourcetypes by host | eval device_category="security"
entity_title_field = host
entity_identifier_fields = host
entity_information_fields = device_sourcetypes, device_category
entity_type = security_device
schedule = 0 */6 * * *
